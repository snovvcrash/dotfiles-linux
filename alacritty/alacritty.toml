# -- Window --------------------------------------------------------------------
[window]
decorations     = "None"
opacity         = 0.80
padding         = { x = 12, y = 10 }
dynamic_title   = true

# -- Scrolling -----------------------------------------------------------------
[scrolling]
history    = 10000
multiplier = 3

# -- Font ----------------------------------------------------------------------
[font]
size = 12.0

[font.normal]
family = "Fira Code"
style  = "Regular"

[font.bold]
family = "Fira Code"
style  = "Bold"

[font.italic]
family = "Fira Code"
style  = "Italic"

[font.offset]
x = 0
y = 1

# -- Colors (Kali-Dark) --------------------------------------------------------
[colors.primary]
background = "#23252e"
foreground = "#ffffff"

[colors.cursor]
text   = "#23252e"
cursor = "#ffffff"

[colors.normal]
black   = "#1f2229"
red     = "#d41919"
green   = "#5ebdab"
yellow  = "#fea44c"
blue    = "#367bf0"
magenta = "#9755b3"
cyan    = "#49aee6"
white   = "#e6e6e6"

[colors.bright]
black   = "#198388"
red     = "#ec0101"
green   = "#47d4b9"
yellow  = "#ff8a18"
blue    = "#277fff"
magenta = "#962ac3"
cyan    = "#05a1f7"
white   = "#ffffff"

# -- Cursor --------------------------------------------------------------------
[cursor]
style            = { shape = "Block", blinking = "Off" }
#blink_interval   = 500
unfocused_hollow = true

# -- Selection -----------------------------------------------------------------
[selection]
save_to_clipboard = true

# -- Mouse ---------------------------------------------------------------------
[mouse]
hide_when_typing = true

[[mouse.bindings]]
mouse  = "Right"
action = "None"

# -- Key bindings ---------------------------------------------------------------
[[keyboard.bindings]]
key    = "Plus"
mods   = "Control"
action = "IncreaseFontSize"

[[keyboard.bindings]]
key    = "Minus"
mods   = "Control"
action = "DecreaseFontSize"

[[keyboard.bindings]]
key    = "Key0"
mods   = "Control"
action = "ResetFontSize"
